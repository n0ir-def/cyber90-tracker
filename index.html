const AK="cyber90_apikey";
function getApiKey(){return localStorage.getItem(AK)||"";}
function saveApiKey(){

const PW=25*60,PB=5*60;
let pm={mode:"work",rem:PW,run:false,sess:0,iv:null};
function pmTick(){pm.rem--;if(pm.rem<=0){if(pm.mode==="work"){pm.sess++;pm.mode="break";pm.rem=PB;beep(600);}else{pm.mode="work";pm.rem=PW;beep(900);}}renderPm();}
function pmToggle(){if(pm.run){clearInterval(pm.iv);pm.run=false;}else{pm.run=true;pm.iv=setInterval(pmTick,1000);}renderPm();}
function pmReset(){clearInterval(pm.iv);pm={...pm,mode:"work",rem:PW,run:false};renderPm();}

    <div style="flex:1;min-width:110px"><div style="background:#e4e4e7;border-radius:3px;height:5px;margin-bottom:.35rem;overflow:hidden">
    <div style="height:100%;width:${pct}%;background:${col};border-radius:3px;transition:width .9s linear"></div></div>
    <div style="font-size:.68rem;color:#aaa">完了セッション: <strong style="color:#555">${pm.sess}</strong>（25分×1セッション）</div></div>
    <div style="display:flex;gap:.35rem">
    <button onclick="pmToggle()" style="font-size:.75rem;padding:.32rem .8rem;border-radius:7px;border:1px solid ${pm.run?"#fecaca":"#bbf7d0"};background:${pm.run?"#fef2f2":"#f0fdf4"};cursor:pointer;color:${col};font-weight:500">${pm.run?"⏸ 一時停止":"▶ 開始"}</button>
    <button onclick="pmReset()" style="font-size:.75rem;padding:.32rem .6rem;border-radius:7px;border:1px solid #e4e4e7;background:#f9f9f9;cursor:pointer;color:#999" title="リセット">↺</button>
    </div></div>`;
}

// ===== Core =====
function save(){
  localStorage.setItem(SK+"_done",JSON.stringify([...completed]));
  localStorage.setItem(SK+"_quiz",JSON.stringify(quizData));
  localStorage.setItem(SK+"_fb",JSON.stringify(feynFeedback));
  localStorage.setItem(SK+"_ft",JSON.stringify(feynText));
  const rv={};for(const[k,v]of Object.entries(quizRevealed))rv[k]=[...v];
  localStorage.setItem(SK+"_rv",JSON.stringify(rv));
}
function prog(t){let d=0;for(let i=t.s;i<=t.e;i++)if(completed.has(i))d++;const tot=t.e-t.s+1;return{d,tot,p:Math.round(d/tot*100)};}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function updateStats(){
  const tot=completed.size,pct=Math.round(tot/TOTAL*100);
  document.getElementById("s-done").textContent=tot+"日";
  document.getElementById("s-left").textContent=(TOTAL-tot)+"日";
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("pct-badge").textContent=pct+"% 完了";
  const b=document.getElementById("main-bar");b.style.width=pct+"%";b.className="bar"+(pct===100?" done":"");
}
function renderGrid(){
  document.getElementById("grid").innerHTML=TOPICS.map(t=>{
    const{d,tot,p}=prog(t),fin=d===tot,sel=selId===t.id;
    return`<button class="card${sel?" sel":""}" onclick="selectT('${t.id}')">
      <div class="ct"><span class="ci">${t.icon}</span><span class="badge${fin?" ok":""}">${d}/${tot}</span></div>
      <div class="cn">${t.name}</div><div class="cr">Day ${t.s}–${t.e}</div>
      <div class="mb"><div class="mf${fin?" ok":""}" style="width:${p}%"></div></div>
    </button>`;
  }).join("");
}
function renderDetail(){
  const el=document.getElementById("detail");
  if(!selId){el.innerHTML="";return;}
  const t=TOPICS.find(x=>x.id===selId);if(!t)return;
  const{d,tot}=prog(t),sec=secOpen[t.id]||{};
  const warnH=t.warn?`<div class="warn">⚠️ 元のプランでは Day 78–84 の内容が記載されていません。復習・強化期間として活用しましょう。</div>`:"";
  const bulkH=`<div class="bulk">${d<tot?`<button class="bb" onclick="markAll('${t.id}',true)">✓ 全日完了</button>`:""}${d>0?`<button class="bb" onclick="markAll('${t.id}',false)">リセット</button>`:""}</div>`;
  const resH=t.res.length?`<div class="ress">${t.res.map(r=>`<a class="rl" href="${r.u}" target="_blank">🔗 ${esc(r.l)}</a>`).join("")}</div>`:"";
  const daysH=`<div class="days">${t.days.map(([day,title])=>{const ck=completed.has(day);return`<label class="dr${ck?" ck":""}"><input type="checkbox" ${ck?"checked":""} onchange="toggleDay(${day})"><span class="dn">Day ${day}</span><span class="dt">${esc(title)}</span>${ck?'<span style="color:#22c55e;font-size:.75rem;flex-shrink:0">✓</span>':""}</label>`;}).join("")}</div>`;

  // Quiz section
  const qo=sec.quiz;let qbody="";
  if(qo){
    if(quizData[t.id]){
      const rev=quizRevealed[t.id]||new Set();
      const items=quizData[t.id].map((q,i)=>`<div class="qcard"><div class="qq">Q${i+1}. ${esc(q.q)}</div>${rev.has(i)?`<div class="qa"><div class="qal">▼ 解答・解説</div>${esc(q.a)}</div>`:`<button class="rbtn" onclick="revealQ('${t.id}',${i})">答えを確認する ▼</button>`}</div>`).join("");
      qbody=`<div class="lsb"><div style="font-size:.7rem;color:#999;margin-bottom:.55rem">💡 まず自分で考えてから答えを確認しましょう（アクティブリコール）</div>${items}<button class="qbtn" style="margin-top:.35rem" onclick="genQuiz('${t.id}')">↺ 問題を再生成</button></div>`;
    }else if(quizLoad===t.id){
      qbody=`<div class="lsb"><span style="font-size:.78rem;color:#aaa">問題を生成しています...</span></div>`;
    }else{
      qbody=`<div class="lsb"><div style="font-size:.76rem;color:#777;margin-bottom:.55rem">「${esc(t.name)}」の理解度確認問題を3問生成します。動画を一通り見た後に使いましょう。</div><button class="qbtn" onclick="genQuiz('${t.id}')">✨ 問題を生成する</button></div>`;
    }
  }
  const quizSec=`<div class="lsec"><div class="lsh" onclick="toggleSec('${t.id}','quiz')"><span class="lst">📝 アクティブリコール — 問題で確認する</span><span class="chev${qo?" open":""}">▼</span></div>${qo?qbody:""}</div>`;

  // Feynman section
  const fo=sec.feynman;let fbody="";
  if(fo){
    const fb=feynFeedback[t.id],sv=feynText[t.id]||"";
    fbody=`<div class="lsb"><div class="fhint">今日学んだことを、何も見ずに自分の言葉で書いてみましょう。<br>うまく説明できない部分が「まだ理解しきれていない箇所」です。</div><textarea class="fi" id="fi-${t.id}" oninput="feynText['${t.id}']=this.value;save()" placeholder="${esc(t.name)}について学んだことを自由に書いてください...">${esc(sv)}</textarea><br><button class="evbtn" id="evbtn-${t.id}" onclick="evalFeyn('${t.id}')" ${feynLoad===t.id?"disabled":""}>${feynLoad===t.id?"評価中...":"✨ Claudeに評価してもらう"}</button>${fb?`<div class="ffb"><div class="fbl">フィードバック</div>${esc(fb)}</div>`:""}</div>`;
  }
  const feynSec=`<div class="lsec"><div class="lsh" onclick="toggleSec('${t.id}','feynman')"><span class="lst">🗣️ ファインマン・テクニック — 自分の言葉で説明する</span><span class="chev${fo?" open":""}">▼</span></div>${fo?fbody:""}</div>`;

  el.innerHTML=`<div class="panel"><div class="ph"><div><div class="pt">${t.icon} ${t.name}</div><div class="pd">${esc(t.desc)}</div>${warnH}</div><button class="xbtn" onclick="selectT(null)">✕</button></div>${bulkH}${resH}${daysH}${quizSec}${feynSec}</div>`;
}

// ===== Actions =====
function toggleDay(day){completed.has(day)?completed.delete(day):completed.add(day);save();render();}
function markAll(id,v){const t=TOPICS.find(x=>x.id===id);if(!t)return;for(let d=t.s;d<=t.e;d++)v?completed.add(d):completed.delete(d);save();render();}
function selectT(id){selId=selId===id?null:id;render();}
function toggleSec(id,k){if(!secOpen[id])secOpen[id]={};secOpen[id][k]=!secOpen[id][k];renderDetail();}
function revealQ(id,i){if(!quizRevealed[id])quizRevealed[id]=new Set();quizRevealed[id].add(i);save();renderDetail();}

async function genQuiz(id){
  if(quizLoad)return;
  const apiKey=getApiKey();
  if(!apiKey){alert("APIキーを設定してください。");return;}
  const t=TOPICS.find(x=>x.id===id);if(!t)return;
  delete quizData[id];delete quizRevealed[id];quizLoad=id;renderDetail();
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:`サイバーセキュリティ「${t.name}（${t.desc}）」の理解度確認問題を3問、短答式で作成してください。\nJSON配列のみ返してください（コードブロック不要）：\n[{"q":"問題文","a":"解答と解説"},{"q":"...","a":"..."},{"q":"...","a":"..."}]\n問題は日本語で、実務・試験で問われる重要概念を中心に。`}]})});
    const data=await r.json();
    const text=data.content?.map(b=>b.text||"").join("")||"[]";
    quizData[id]=JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch(e){quizData[id]=[{q:"問題の生成に失敗しました。再度お試しください。",a:""}];}
  quizLoad=null;save();renderDetail();
}

async function evalFeyn(id){
  if(feynLoad)return;
  const apiKey=getApiKey();
  if(!apiKey){alert("APIキーを設定してください。");return;}
  const t=TOPICS.find(x=>x.id===id);if(!t)return;
  const txt=feynText[id]||"";
  if(!txt.trim()){alert("説明を入力してください。");return;}
  feynLoad=id;renderDetail();
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,messages:[{role:"user",content:`サイバーセキュリティ学習者が「${t.name}（${t.desc}）」について以下のように説明しました：\n\n---\n${txt}\n---\n\n以下の形式で日本語フィードバックをください（合計250文字程度）：\n✅ 正確に理解できている点\n⚠️ もう少し補足できる点\n❌ 誤解・不足している重要ポイント（あれば）\n\n励ましを込めた口調でお願いします。`}]})});
    const data=await r.json();
    feynFeedback[id]=data.content?.map(b=>b.text||"").join("")||"評価できませんでした";
  }catch(e){feynFeedback[id]="エラーが発生しました。再度お試しください。";}
  feynLoad=null;save();renderDetail();
}

function render(){updateStats();renderGrid();renderDetail();}
renderPm();render();
</script>
</body>
